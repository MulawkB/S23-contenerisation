services:

  mongo:
    image: mongo:7
    container_name: mongo-db
    ports:
      - "27017:27017"
    restart: always

  inventory-service:
    build: ./Inventory/inventory-service
    container_name: inventory-service
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      MONGO_HOST: mongo

  order-service:
    build: ./Order/order-service
    container_name: order-service
    ports:
      - "3001:3001"
    depends_on:
      - mongo
    environment:
      MONGO_HOST: mongo

  payment-service:
    build: ./Payment/payment-service
    container_name: payment-service
    ports:
      - "3002:3002"
    depends_on:
      - mongo
    environment:
      MONGO_HOST: mongo

  api-gateway:
    build: ./Gateway
    container_name: api-gateway
    ports:
      - "9001:9001"
    depends_on:
      - inventory-service
      - order-service
      - payment-service